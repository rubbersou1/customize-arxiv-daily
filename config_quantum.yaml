categories:
  - quant-ph
  - physics.atom-ph
  - physics.optics
  - cond-mat.quant-gas

description: |
  I am interested in daily arXiv recommendations focused on quantum precision
  measurement and quantum computing.

  I am especially interested in:

  - quantum metrology

  - quantum sensing

  - quantum Fisher information

  - classical Fisher information

  - spin squeezing

  - one-axis twisting

  - Rydberg atoms

  - neutral-atom quantum computing

  - trapped ions

  - atomic clocks

  - Ramsey interferometry

  - atom interferometry

  - cavity QED

  - optical tweezers

  - quantum control

  - quantum gates

  - microwave sensing using Rydberg systems

  I prefer papers with clear relevance to experiments, theory, protocols,
  algorithms, hardware platforms, error mitigation, control, readout, or
  performance limits in quantum sensing, metrology, or quantum computation.

exclude_topics:
  - quantum gravity
  - cosmology
  - high energy theory

runtime:
  max_entries: 100
  max_paper_num: 60
  num_workers: 16
  temperature: 0.7
  title: "Daily arXiv - Quantum Metrology and Quantum Computing"
  save: true

